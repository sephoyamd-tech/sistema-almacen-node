<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo Conceptos - Node.js</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
<div class="container" style="max-width: 600px;">
<div class="card shadow p-4 mb-4">
<h3 class="text-center">Catálogo de Conceptos</h3>
<form id="formConcepto">
<div class="mb-3">
<label>Clave</label>
<input type="text" id="clave" class="form-control" required>
</div>
<div class="mb-3">
<label>Descripción</label>
<input type="text" id="desc" class="form-control" required>
</div>
<button type="submit" class="btn btn-primary w-100">Guardar Concepto</button>
</form>
</div>

<table class="table table-striped border shadow-sm">
<thead class="table-dark">
<tr><th>Clave</th><th>Descripción</th><th>Acciones</th></tr>
</thead>
<tbody id="tabla-body"></tbody>
</table>
</div>
<script src="apps.js"></script>
</body>
</html>
